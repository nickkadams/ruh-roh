name: trivy

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    # name: Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6.0.2

    # - name: Run Trivy vulnerability scanner in config mode
    #   uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # @v0.35.0
    #   with:
    #     scan-type: 'config'
    #     scan-ref: 'docker/'
    #     trivy-config: trivy.yaml

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # @v4
    
    - name: Build hardened-nginx image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # @v7
      with:
        context: docker/hardened
        push: false
        tags: hardened-nginx:latest

    - name: Run Trivy vulnerability scanner in vuln mode for hardened-nginx
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # @v0.35.0
      with:
        image-ref: 'hardened-nginx:latest'
        trivy-config: trivy.yaml

    - name: Build vulnerable-nginx image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # @v7
      with:
        context: docker/vulnerable
        push: false
        tags: vulnerable-nginx:latest

    - name: Run Trivy vulnerability scanner in vuln mode for vulnerable-nginx
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # @v0.35.0
      with:
        image-ref: 'vulnerable-nginx:latest'
        trivy-config: trivy.yaml        

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # @v4.32.6
      
      # Results are generated only on a success or failure
      # this is required since GitHub by default won't run the next step
      # when the previous one has failed. Security checks that do not pass will 'fail'.
      # An alternative is to add `continue-on-error: true` to the previous step
      if: success() || failure()
      with:
        sarif_file: results/trivy-results.sarif
